# Saved searches for the Veritrace app.
#
# The first is the noisy single-signal trigger alert. When it fires it hands the
# alert to Veritrace through the custom alert action. The second is the tuned,
# higher-fidelity correlation detection that Veritrace proposes after an
# investigation. It ships disabled and is enabled by an analyst once approved,
# which is the detection-as-code loop.

[Veritrace - Brute force authentication success]
search = index=security sourcetype=linux_secure | stats count(eval(action="failure")) as failures count(eval(action="success")) as successes values(src) as src by user | where failures > 20 AND successes > 0
description = Accounts with many failed logins followed by a success. Sends the alert to Veritrace for autonomous investigation.
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
action.veritrace = 1
action.veritrace.param.veritrace_api_url = http://localhost:8400

[Veritrace - Account takeover with lateral movement and exfiltration]
search = index=security sourcetype=linux_secure action=success | stats earliest(_time) as login_time values(src) as src by user | join user [ search index=security sourcetype=stream:tcp dest_port=445 | stats values(dest) as smb_targets by user ] | join user [ search index=security sourcetype=stream:tcp dest_ip="45.137.21.53" | stats sum(bytes_out) as bytes_out by user ] | where bytes_out > 100000000 | eval risk_score=90, mitre="T1078,T1021.002,T1041" | table _time user src smb_targets bytes_out risk_score mitre
description = Proposed by Veritrace. Fires only when account takeover, lateral movement over SMB, and bulk exfiltration to one external address co-occur. Higher fidelity than the standalone brute-force alert.
dispatch.earliest_time = -6h
dispatch.latest_time = now
enableSched = 0
cron_schedule = */10 * * * *
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 5
