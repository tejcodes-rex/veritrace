# Custom alert action that hands a firing Splunk alert to the Veritrace
# autonomous SOC analyst for investigation.

[veritrace]
is_custom = 1
python.version = python3
python.required = 3.13
label = Send to Veritrace
description = Hand the firing alert to the Veritrace autonomous SOC analyst for investigation over MCP.
icon_path = appIcon.png
payload_format = json
param._cam = {"task": ["create"], "subject": ["endpoint"], "category": ["Information Conveyance"]}
param.veritrace_api_url = http://localhost:8400
